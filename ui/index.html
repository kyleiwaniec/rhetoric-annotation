<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<html>
<meta charset="utf-8">
<title>Liguistic devices annotation</title>
<script
  src="https://code.jquery.com/jquery-3.6.4.min.js"
  integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8="
  crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
<script src="js/jquery.arrayUtilities.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>


<script src="https://d3js.org/d3.v3.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/parser.js"></script>
<script src="js/d3Tree.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>

<link rel="stylesheet" type="text/css" href="css/tree-viewer.css">

<body>


<div aria-live="polite" aria-atomic="true" class="bg-body-secondary position-relative bd-example-toasts rounded-3">
  <div class="toast-container p-3 top-0 start-50 translate-middle-x" >
    <div class="toast text-bg-success">
      <div class="toast-body">
        Your annotation was saved successfully.
      </div>
    </div>
  </div>
</div>


<div class="container-fluid min-vh-100 d-flex flex-column">

<div class="row">
	<div class="col">
		<div id="tree-container"></div>
	</div>
</div>
<div class="row">
	<div class="col">
		<div id="sentence_container">Loading sentence...</div>
	</div>
</div>

<div class="row flex-grow-1">
	<div class="col-8">
		
		<div class="row">
			<div class="col">
				<nav>
				  <div class="nav nav-tabs" id="nav-tab" role="tablist">
				    
				    <button class="nav-link active" id="nav-word-tab" data-bs-toggle="tab" data-bs-target="#nav-word" type="button" role="tab" aria-controls="nav-word" aria-selected="false">Word</button>

				    <button class="nav-link" id="nav-sentence-tab" data-bs-toggle="tab" data-bs-target="#nav-sentence" type="button" role="tab" aria-controls="nav-sentence" aria-selected="true">Sentence</button>

				    <button class="nav-link" id="nav-rhetoric-tab" data-bs-toggle="tab" data-bs-target="#nav-rhetoric" type="button" role="tab" aria-controls="nav-rhetoric" aria-selected="false">Rhetoric</button>

				    <button class="nav-link" id="nav-semcat-tab" data-bs-toggle="tab" data-bs-target="#nav-semcat" type="button" role="tab" aria-controls="nav-semcat" aria-selected="false">Semantic Categories</button>

				  </div>
				</nav>
			</div>
			<div class="col-md-auto">

				<button type="button" class="btn btn-secondary" id="timer">00:00</button>
				<!-- <button type="button" class="btn btn-primary" id="save_annotations" onclick="saveAnnotation(confirmSaved); return false;">Save changes</button> -->
				<button type="button" class="btn btn-success" id="mark_completed" onclick="markCompleted(); return false;">Mark completed</button>
				<button type="button" class="btn btn-warning" id="next_sentence" onclick="getPrevSentence(); return false;">Prev Sentence</button>
				<button type="button" class="btn btn-warning" id="next_sentence" onclick="getNextSentence(); return false;">Next Sentence</button>

				<button type="button" 
					class="btn btn-outline-warning" 
					data-bs-toggle="tooltip" 
					data-bs-placement="top" 
					data-bs-title="in-progress" 
					id="inprogress" 
					onclick="get_stats(); return false;">0
				</button>

				<button type="button" 
					class="btn btn-outline-success" 
					data-bs-toggle="tooltip" 
					data-bs-placement="top" 
					data-bs-title="completed" 
					id="completed" 
					onclick="get_stats(); return false;">0
				</button>

			</div>
		</div>
		
		<div class="tab-content p-3" id="nav-tabContent">
			<div class="tab-pane fade show active" id="nav-word" role="tabpanel" aria-labelledby="nav-word-tab" tabindex="0"></div>
			<div class="tab-pane fade" id="nav-sentence" role="tabpanel" aria-labelledby="nav-sentence-tab" tabindex="0"></div>
			<div class="tab-pane fade" id="nav-rhetoric" role="tabpanel" aria-labelledby="nav-rhetoric-tab" tabindex="0"></div>
			<div class="tab-pane fade" id="nav-semcat" role="tabpanel" aria-labelledby="nav-semcat-tab" tabindex="0"></div>
		</div>

	</div>
	<div class="col-4">
		<textarea id="jsonContainer" class="">Loading JSON...</textarea>
	</div>
</div>

</div>



</body>
</html>
